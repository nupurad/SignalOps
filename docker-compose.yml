services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [kafka]
    entrypoint: ["/bin/sh", "-c"]
    command: ["/app/create-topics.sh"]
    environment:
      KAFKA_BROKER: kafka:9092
    volumes:
      - "./workers/create-topics.sh:/app/create-topics.sh:ro"
    restart: "no"

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: signalops
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: signalops
    volumes: [tsdb_data:/var/lib/postgresql/data]

  api:
    build: ./backend
    ports: ["8000:8000"]
    depends_on: [timescaledb]
    env_file: .env
    volumes:
      - "./signalops.yml:/app/signalops.yml:ro"
      - "./endpoints.json:/app/endpoints.json:ro"
    environment:
      ENDPOINTS_FILE: /app/endpoints.json


  consumer-db:
    build: ./workers
    command: python consumer_db.py
    depends_on: [kafka, timescaledb]
    env_file: .env
    restart: always

  consumer-prometheus:
    build: ./workers
    command: python consumer_prometheus.py
    ports: ["8001:8001"]
    depends_on: [kafka]
    env_file: .env
    restart: always

  consumer-anomaly:
    build: ./workers
    command: python consumer_anomaly.py
    depends_on: [kafka]
    env_file: .env
    restart: always

  consumer-alert:
    build: ./workers
    command: python consumer_alert.py
    depends_on: [kafka]
    env_file: .env
    restart: always

  producer:
    build: ./workers
    command: python producer.py
    depends_on: [kafka]
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
    volumes:
      - "./endpoints.json:/app/endpoints.json:ro"
    restart: always

  consumer-1:
    build: ./workers
    command: python consumer.py
    depends_on: [kafka]
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
    restart: always

  consumer-2:
    build: ./workers
    command: python consumer.py
    depends_on: [kafka]
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
    restart: always

  consumer-3:
    build: ./workers
    command: python consumer.py
    depends_on: [kafka]
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
    restart: always

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [api]
    environment:
      API_BASE: http://api:8000
    volumes:
      - "./frontend:/app"
      - "./frontend/node_modules:/app/node_modules"

  prometheus:
    image: prom/prometheus
    volumes: [./prometheus.yml:/etc/prometheus/prometheus.yml]
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana
    ports: ["3001:3000"]

volumes:
  tsdb_data:
